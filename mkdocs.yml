site_name: multimodal-registration
site_description: 3-D multimodal image registration for DCT and PCT volumes
site_url: https://pedrodamas0803.github.io/multimodal-registration/
repo_url: https://github.com/pedrodamas0803/multimodal-registration
repo_name: pedrodamas0803/multimodal-registration

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - content.code.copy
  palette:
    - scheme: default
      primary: indigo
      accent: indigo

nav:
  - Home: index.md
  - Installation: installation.md
  - Theory:
      - Image Registration: theory/registration.md
      - Deformation & Rotations: theory/deformation.md
      - Crystal Orientations & IPF: theory/crystallography.md
  - User Guide:
      - Full Pipeline: guide/workflow.md
      - Interactive Registration: guide/interactive.md
      - Exporting Data: guide/export.md
      - GPU Acceleration: guide/gpu.md
  - API Reference: api/reference.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: numpy
            show_source: true
            show_root_heading: true
            heading_level: 2

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - attr_list
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - assets/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
